<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Calliope</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <header>
      <div class="brand">
        <img src="../icons/icon32.png" alt="" width="28" height="28" />
        <h1>Calliope</h1>
      </div>
      <button id="settings-toggle" class="icon-button" title="Settings">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"></circle>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 1 1-4 0v-.09a1.65 1.65 0 0 0-1-1.51 1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 1 1 0-4h.09a1.65 1.65 0 0 0 1.51-1 1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33h.01a1.65 1.65 0 0 0 1-1.51V3a2 2 0 1 1 4 0v.09a1.65 1.65 0 0 0 1 1.51h.01a1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82v.01a1.65 1.65 0 0 0 1.51 1H21a2 2 0 1 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
        </svg>
      </button>
    </header>

    <section class="card">
      <div class="controls">
        <div class="control">
          <button id="stop" class="round" title="Stop" disabled>
            <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor">
              <rect x="6" y="6" width="12" height="12" rx="2"></rect>
            </svg>
          </button>
          <span>Stop</span>
        </div>
        <div class="control">
          <button id="pause" class="round primary" title="Pause" disabled>
            <svg viewBox="0 0 24 24" width="22" height="22" fill="currentColor">
              <rect x="7" y="5" width="3.6" height="14" rx="1.4"></rect>
              <rect x="13.4" y="5" width="3.6" height="14" rx="1.4"></rect>
            </svg>
          </button>
          <span>Pause</span>
        </div>
        <div class="control">
          <button id="play" class="round" title="Play the current selection">
            <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor">
              <path d="M8 5.5v13a1 1 0 0 0 1.53.85l10-6.5a1 1 0 0 0 0-1.7l-10-6.5A1 1 0 0 0 8 5.5z"></path>
            </svg>
          </button>
          <span id="play-label">Play</span>
        </div>
      </div>

      <div class="divider"></div>

      <div class="section">
        <div class="row">
          <span class="label">Speed</span>
          <output id="rate-value">1.0x</output>
        </div>
        <input id="rate" type="range" min="0.5" max="3" step="0.1" value="1" />
        <div class="row minmax"><span>0.5x</span><span>3x</span></div>
      </div>

      <div class="divider"></div>

      <div class="section">
        <span class="label">Voice</span>
        <select id="voice"></select>
      </div>

      <div class="divider"></div>

      <div id="status" data-state="stopped">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor">
          <rect x="2" y="10" width="2.4" height="4" rx="1.2"></rect>
          <rect x="6.4" y="7" width="2.4" height="10" rx="1.2"></rect>
          <rect x="10.8" y="4" width="2.4" height="16" rx="1.2"></rect>
          <rect x="15.2" y="7" width="2.4" height="10" rx="1.2"></rect>
          <rect x="19.6" y="10" width="2.4" height="4" rx="1.2"></rect>
        </svg>
        <span id="status-text">Stopped</span>
      </div>
    </section>

    <section id="settings" class="card" hidden>
      <label class="field">
        <span>Engine</span>
        <select id="engine">
          <option value="local">Piper — natural, offline</option>
          <option value="browser">System voices</option>
        </select>
      </label>
    </section>

    <p id="error" hidden></p>

    <script src="popup.js"></script>
  </body>
</html>
